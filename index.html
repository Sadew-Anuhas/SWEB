<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sadew Anuhas</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://code.jquery.com/jquery-3.4.1.js"></script>
    <link rel="icon" href="sa3.png" type="image/x-icon">
</head>
<body>


<div class="hee">
        <button id="mode-toggle">Dark | Light</button>
    </div>


    <div class="glass-background">
        <div class="container">
            <div class="logo">
                <img alt="" src="logo.png">
            </div>
            <h1>STARTING SOON</h1>
            <div class="time">
                <div class="item">
                    <div id="day">05</div>
                    day
                </div>
                <div class="item">
                    <div id="hour">12</div> 
                    hour
                </div>
                <div class="item">
                    <div id="minute">30</div> 
                    minute
                </div>
                <div class="item">
                    <div id="seconds">12</div>
                    seconds
                </div>
            </div>
            <br><br>
            <div class="buttonin">
                <a href="https://sadew.link">
                    <button id="previewButton">PRE VIEW</button>
                </a>
            </div>
<br>

<div class="heart-btn">
    <div class="content">
      <span class="heart"></span>
      <span class="text">Like</span>
      <span class="numb"></span>
    </div>
  </div>

  <script>
    $(document).ready(function(){
      $('.content').click(function(){
        $('.content').toggleClass("heart-active")
        $('.text').toggleClass("heart-active")
        $('.numb').toggleClass("heart-active")
        $('.heart').toggleClass("heart-active")
      });
    });
  </script>


        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
